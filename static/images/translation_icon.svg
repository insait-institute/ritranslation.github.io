<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#D64045"/>

  <!-- Globe circle -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#fff" stroke-width="2.5"/>

  <!-- Globe horizontal lines (latitude) -->
  <ellipse cx="50" cy="50" rx="32" ry="12" fill="none" stroke="#fff" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="32" ry="24" fill="none" stroke="#fff" stroke-width="1.5"/>

  <!-- Globe vertical line (longitude) -->
  <ellipse cx="50" cy="50" rx="12" ry="32" fill="none" stroke="#fff" stroke-width="1.5"/>

  <!-- Translation symbols around the globe -->
  <!-- Top: Latin A -->
  <text x="50" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">A</text>

  <!-- Right: Chinese character -->
  <text x="80" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">文</text>

  <!-- Bottom: Arabic character -->
  <text x="50" y="87" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">ع</text>

  <!-- Left: Cyrillic -->
  <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Я</text>

  <!-- Center arrows forming a circle (translation flow) -->
  <g transform="translate(50, 50)">
    <!-- Circular arrows showing translation flow -->
    <path d="M -8,-8 A 11.3 11.3 0 0 1 8,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <path d="M 8,-8 L 6,-5 M 8,-8 L 11,-7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

    <path d="M 8,8 A 11.3 11.3 0 0 1 -8,8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <path d="M -8,8 L -6,5 M -8,8 L -11,7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
